{% extends "base.html" %} {% block title %} Usuários {% endblock %} {% block
content %}
<table class="table">
  <thead class="table-dark">
    <th>Name</th>
    <th>Username</th>
    <th>Password</th>
  </thead>
  {% for user in context %}
  <tr>
    <td>{{ user.name }}</td>
    <td>{{ user.username }}</td>
    <td>{{ user.password }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
